services:
  litellm-postgres:
    image: postgres:16-alpine
    container_name: gm-litellm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${LITELLM_DB_NAME:-litellm}
      POSTGRES_USER: ${LITELLM_DB_USER:-litellm}
      POSTGRES_PASSWORD: ${LITELLM_DB_PASSWORD:-litellm_password}
    ports:
      - "${LITELLM_DB_PORT:-55432}:5432"
    volumes:
      - litellm_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LITELLM_DB_USER:-litellm} -d ${LITELLM_DB_NAME:-litellm}"]
      interval: 5s
      timeout: 5s
      retries: 10

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: gm-litellm
    restart: unless-stopped
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    depends_on:
      litellm-postgres:
        condition: service_healthy
    env_file:
      - ./.env
    environment:
      LITELLM_LOG: INFO
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      DATABASE_URL: ${DATABASE_URL:-postgresql://${LITELLM_DB_USER:-litellm}:${LITELLM_DB_PASSWORD:-litellm_password}@litellm-postgres:5432/${LITELLM_DB_NAME:-litellm}}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    volumes:
      - ./config.yaml:/app/config.yaml:ro

volumes:
  litellm_pg_data:
